<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MasterJuris - Sistema Completo de Recursos</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        h2 { color: #2980b9; border-bottom: 2px solid #3498db; margin-top: 40px; }
        .fase { background: #f9f9f9; border-left: 5px solid #3498db; padding: 15px; margin: 10px 0; }
        .questao { background: #fffdf0; padding: 10px; border: 1px solid #f1c40f; margin-top: 8px; font-size: 0.9em; }
        .fase-title { font-weight: bold; color: #34495e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plataforma de Estudos: Processo Civil</h1>

        <!-- GERADOR DE CONTEÚDO -->
        <script>
            const recursos = ["Teoria Geral", "Apelação", "Agravo de Instrumento", "Embargos de Declaração", "Agravo Interno", "Recurso Ordinário", "Recurso Especial", "Recurso Extraordinário", "Agravo em REsp/RE", "Embargos de Divergência"];
            
            recursos.forEach(nome => {
                document.write(`<h2>${nome}</h2>`);
                for(let i=1; i<=6; i++) {
                    let tituloFase = ["Básico", "Princípios de Base", "Evolução Técnica", "Intermediário", "Complexo", "Elite"][i-1];
                    document.write(`
                        <div class="fase">
                            <div class="fase-title">Fase ${i}: ${tituloFase}</div>
                            <p>Conteúdo de estudo e exemplos fáticos sobre ${nome} - Fase ${i}...</p>
                            <div class="questao">
                                <strong>Questões de Fixação:</strong><br>
                                1. [Questão sobre ${tituloFase}]<br>
                                2. [Questão sobre ${tituloFase}]<br>
                                3. [Questão sobre ${tituloFase}]<br>
                                4. [Questão sobre ${tituloFase}]
                            </div>
                        </div>
                    `);
                }
            });
        </script>
    </div>
</body>
</html>
